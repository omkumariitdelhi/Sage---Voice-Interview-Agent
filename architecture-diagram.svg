<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111A2E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="980" fill="url(#bgGlow)"/>

  <!-- Title -->
  <text x="60" y="58" font-size="34" font-weight="700" fill="#F8FAFC">Voice Interview Agent</text>
  <text x="60" y="88" font-size="17" fill="#94A3B8">Architecture &amp; Tech Stack — voice-in → grounded LLM interview → voice-out → feedback</text>
  <rect x="60" y="100" width="120" height="4" rx="2" fill="#2563EB"/>

  <!-- ============ PIPELINE LABEL ============ -->
  <text x="60" y="148" font-size="15" font-weight="700" fill="#94A3B8" letter-spacing="1.5">REQUEST FLOW — ONE INTERVIEW TURN</text>

  <!-- ============ 5 PIPELINE STAGE CARDS ============ -->
  <!-- Card geometry: x=60,362,664,966,1268  width=272  y=175 height=350 -->

  <!-- Stage 1: Voice In -->
  <g>
    <rect x="60" y="175" width="272" height="350" rx="14" fill="#1B2336" stroke="#475569" stroke-width="1.5"/>
    <rect x="60" y="175" width="6" height="350" rx="3" fill="#2563EB"/>
    <circle cx="100" cy="215" r="18" fill="#1E293B" stroke="#2563EB" stroke-width="1.5"/>
    <text x="100" y="221" font-size="14" font-weight="700" fill="#2563EB" text-anchor="middle">1</text>
    <!-- mic icon -->
    <g transform="translate(230,200)" stroke="#2563EB" stroke-width="1.8" fill="none" stroke-linecap="round">
      <rect x="0" y="0" width="14" height="20" rx="7"/>
      <path d="M-6 14 a 13 13 0 0 0 26 0"/>
      <line x1="7" y1="27" x2="7" y2="33"/>
      <line x1="0" y1="33" x2="14" y2="33"/>
    </g>
    <text x="92" y="260" font-size="18" font-weight="700" fill="#F8FAFC">Voice In</text>
    <text x="92" y="284" font-size="13" fill="#94A3B8">Browser MediaRecorder</text>
    <text x="92" y="304" font-size="13" fill="#94A3B8">captures mic audio</text>
    <rect x="92" y="324" width="180" height="30" rx="7" fill="#0F172A" stroke="#2563EB" stroke-width="1"/>
    <text x="182" y="343" font-size="12.5" font-weight="600" fill="#60A5FA" text-anchor="middle">Deepgram Nova-2 (STT)</text>
    <text x="92" y="380" font-size="12" fill="#64748B">via LiteLLM gateway —</text>
    <text x="92" y="398" font-size="12" fill="#64748B">app/gateway/stt.py</text>
    <text x="92" y="440" font-size="12.5" fill="#94A3B8">speech transcribed to</text>
    <text x="92" y="458" font-size="12.5" fill="#94A3B8">candidate's spoken text</text>
    <text x="92" y="495" font-size="12" fill="#475569">retries · typed errors</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="332" y1="350" x2="358" y2="350" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Grounding -->
  <g>
    <rect x="362" y="175" width="272" height="350" rx="14" fill="#1B2336" stroke="#475569" stroke-width="1.5"/>
    <rect x="362" y="175" width="6" height="350" rx="3" fill="#22C55E"/>
    <circle cx="402" cy="215" r="18" fill="#1E293B" stroke="#22C55E" stroke-width="1.5"/>
    <text x="402" y="221" font-size="14" font-weight="700" fill="#22C55E" text-anchor="middle">2</text>
    <!-- db/retrieval icon -->
    <g transform="translate(525,198)" stroke="#22C55E" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="9" cy="5" rx="9" ry="4"/>
      <path d="M0 5 v18 a9 4 0 0 0 18 0 V5"/>
      <path d="M0 13 a9 4 0 0 0 18 0"/>
    </g>
    <text x="394" y="260" font-size="18" font-weight="700" fill="#F8FAFC">Grounding</text>
    <text x="394" y="284" font-size="13" fill="#94A3B8">Chroma vector store +</text>
    <text x="394" y="304" font-size="13" fill="#94A3B8">local MiniLM embeddings</text>
    <rect x="394" y="324" width="180" height="30" rx="7" fill="#0F172A" stroke="#22C55E" stroke-width="1"/>
    <text x="484" y="343" font-size="12.5" font-weight="600" fill="#4ADE80" text-anchor="middle">data/qa_bank.yaml</text>
    <text x="394" y="380" font-size="12" fill="#64748B">deterministic lookup by</text>
    <text x="394" y="398" font-size="12" fill="#64748B">sequence index (no chunking)</text>
    <text x="394" y="440" font-size="12.5" fill="#94A3B8">returns question +</text>
    <text x="394" y="458" font-size="12.5" fill="#94A3B8">ideal_answer + key_points</text>
    <text x="394" y="495" font-size="12" fill="#475569">zero network at request time</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="634" y1="350" x2="660" y2="350" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: LLM Interviewer -->
  <g>
    <rect x="664" y="175" width="272" height="350" rx="14" fill="#1B2336" stroke="#475569" stroke-width="1.5"/>
    <rect x="664" y="175" width="6" height="350" rx="3" fill="#A855F7"/>
    <circle cx="704" cy="215" r="18" fill="#1E293B" stroke="#A855F7" stroke-width="1.5"/>
    <text x="704" y="221" font-size="14" font-weight="700" fill="#A855F7" text-anchor="middle">3</text>
    <!-- chat/brain icon -->
    <g transform="translate(825,198)" stroke="#A855F7" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 1 h20 v14 h-9 l-4 4 v-4 h-7 z"/>
    </g>
    <text x="696" y="260" font-size="18" font-weight="700" fill="#F8FAFC">LLM Interviewer</text>
    <text x="696" y="284" font-size="13" fill="#94A3B8">LangGraph state machine</text>
    <text x="696" y="304" font-size="13" fill="#94A3B8">("Sage" persona)</text>
    <rect x="696" y="324" width="180" height="30" rx="7" fill="#0F172A" stroke="#A855F7" stroke-width="1"/>
    <text x="786" y="343" font-size="12.5" font-weight="600" fill="#C084FC" text-anchor="middle">Claude Haiku 4.5</text>
    <text x="696" y="380" font-size="12" fill="#64748B">ask → evaluate → follow-up /</text>
    <text x="696" y="398" font-size="12" fill="#64748B">teach / recap → advance</text>
    <text x="696" y="440" font-size="12.5" fill="#94A3B8">grounded in retrieved</text>
    <text x="696" y="458" font-size="12.5" fill="#94A3B8">entry; Guardrails no-leak</text>
    <text x="696" y="495" font-size="12" fill="#475569">bounded follow-up budget</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="936" y1="350" x2="962" y2="350" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Voice Out -->
  <g>
    <rect x="966" y="175" width="272" height="350" rx="14" fill="#1B2336" stroke="#475569" stroke-width="1.5"/>
    <rect x="966" y="175" width="6" height="350" rx="3" fill="#F59E0B"/>
    <circle cx="1006" cy="215" r="18" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="1006" y="221" font-size="14" font-weight="700" fill="#F59E0B" text-anchor="middle">4</text>
    <!-- speaker icon -->
    <g transform="translate(1128,198)" stroke="#F59E0B" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 7 h5 l7 -6 v18 l-7 -6 h-5 z"/>
      <path d="M16 4 a 8 8 0 0 1 0 12"/>
      <path d="M19 1 a 13 13 0 0 1 0 18"/>
    </g>
    <text x="998" y="260" font-size="18" font-weight="700" fill="#F8FAFC">Voice Out</text>
    <text x="998" y="284" font-size="13" fill="#94A3B8">streamed via WebSocket,</text>
    <text x="998" y="304" font-size="13" fill="#94A3B8">played with Web Audio API</text>
    <rect x="998" y="324" width="180" height="30" rx="7" fill="#0F172A" stroke="#F59E0B" stroke-width="1"/>
    <text x="1088" y="343" font-size="12.5" font-weight="600" fill="#FBBF24" text-anchor="middle">Deepgram Aura-2 (TTS)</text>
    <text x="998" y="380" font-size="12" fill="#64748B">raw PCM chunks played</text>
    <text x="998" y="398" font-size="12" fill="#64748B">back-to-back as they arrive</text>
    <text x="998" y="440" font-size="12.5" fill="#94A3B8">first audio byte ~2s,</text>
    <text x="998" y="458" font-size="12.5" fill="#94A3B8">not ~15s+ full-clip wait</text>
    <text x="998" y="495" font-size="12" fill="#475569">fallback to one-shot REST</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="1238" y1="350" x2="1264" y2="350" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 5: Feedback -->
  <g>
    <rect x="1268" y="175" width="272" height="350" rx="14" fill="#1B2336" stroke="#475569" stroke-width="1.5"/>
    <rect x="1268" y="175" width="6" height="350" rx="3" fill="#F43F5E"/>
    <circle cx="1308" cy="215" r="18" fill="#1E293B" stroke="#F43F5E" stroke-width="1.5"/>
    <text x="1308" y="221" font-size="14" font-weight="700" fill="#F43F5E" text-anchor="middle">5</text>
    <!-- clipboard check icon -->
    <g transform="translate(1430,196)" stroke="#F43F5E" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="16" height="20" rx="2"/>
      <path d="M7 0 h6 v4 h-6 z" fill="#F43F5E" stroke="none"/>
      <path d="M6 12 l3 3 l5 -6"/>
    </g>
    <text x="1300" y="260" font-size="18" font-weight="700" fill="#F8FAFC">Feedback</text>
    <text x="1300" y="284" font-size="13" fill="#94A3B8">end-of-session structured</text>
    <text x="1300" y="304" font-size="13" fill="#94A3B8">report, schema-validated</text>
    <rect x="1300" y="324" width="180" height="30" rx="7" fill="#0F172A" stroke="#F43F5E" stroke-width="1"/>
    <text x="1390" y="343" font-size="12.5" font-weight="600" fill="#FB7185" text-anchor="middle">Guardrails-checked JSON</text>
    <text x="1300" y="380" font-size="12" fill="#64748B">per-question verdicts +</text>
    <text x="1300" y="398" font-size="12" fill="#64748B">overall strengths/improvements</text>
    <text x="1300" y="440" font-size="12.5" fill="#94A3B8">no-leak re-checked on</text>
    <text x="1300" y="458" font-size="12.5" fill="#94A3B8">feedback notes too</text>
    <text x="1300" y="495" font-size="12" fill="#475569">safe fallback if malformed</text>
  </g>

  <!-- ============ INFRASTRUCTURE LABEL ============ -->
  <text x="60" y="575" font-size="15" font-weight="700" fill="#94A3B8" letter-spacing="1.5">SUPPORTING INFRASTRUCTURE</text>
  <line x1="60" y1="588" x2="1540" y2="588" stroke="#1E293B" stroke-width="1"/>

  <!-- ============ 4 INFRA BOXES ============ -->
  <!-- x=60,438,816,1194 width=348 y=610 height=200 -->

  <g>
    <rect x="60" y="610" width="348" height="200" rx="14" fill="#161E30" stroke="#334155" stroke-width="1.5"/>
    <text x="86" y="645" font-size="17" font-weight="700" fill="#F8FAFC">LangGraph</text>
    <text x="86" y="668" font-size="12.5" fill="#94A3B8">Stateful orchestration of the</text>
    <text x="86" y="686" font-size="12.5" fill="#94A3B8">whole interview as an explicit</text>
    <text x="86" y="704" font-size="12.5" fill="#94A3B8">graph: qa_index, follow_up_count,</text>
    <text x="86" y="722" font-size="12.5" fill="#94A3B8">transcript — not one mega-prompt.</text>
    <text x="86" y="750" font-size="12" fill="#64748B">interrupt()/Command(resume=…)</text>
    <text x="86" y="768" font-size="12" fill="#64748B">for human-in-the-loop turns</text>
    <text x="86" y="792" font-size="11.5" fill="#475569">app/interview/graph.py</text>
  </g>

  <g>
    <rect x="438" y="610" width="348" height="200" rx="14" fill="#161E30" stroke="#334155" stroke-width="1.5"/>
    <text x="464" y="645" font-size="17" font-weight="700" fill="#F8FAFC">LiteLLM Gateway</text>
    <text x="464" y="668" font-size="12.5" fill="#94A3B8">One chokepoint per call type —</text>
    <text x="464" y="686" font-size="12.5" fill="#94A3B8">no inline provider calls anywhere</text>
    <text x="464" y="704" font-size="12.5" fill="#94A3B8">else in the app. Retry/backoff,</text>
    <text x="464" y="722" font-size="12.5" fill="#94A3B8">typed errors, structured logging.</text>
    <text x="464" y="750" font-size="12" fill="#64748B">empty-content + JSON-fence</text>
    <text x="464" y="768" font-size="12" fill="#64748B">provider-hiccup recovery built in</text>
    <text x="464" y="792" font-size="11.5" fill="#475569">app/gateway/{llm,stt,tts}.py</text>
  </g>

  <g>
    <rect x="816" y="610" width="348" height="200" rx="14" fill="#161E30" stroke="#334155" stroke-width="1.5"/>
    <text x="842" y="645" font-size="17" font-weight="700" fill="#F8FAFC">Guardrails AI</text>
    <text x="842" y="668" font-size="12.5" fill="#94A3B8">Structural no-leak validator —</text>
    <text x="842" y="686" font-size="12.5" fill="#94A3B8">exact + fuzzy match on every</text>
    <text x="842" y="704" font-size="12.5" fill="#94A3B8">candidate-facing line, bounded</text>
    <text x="842" y="722" font-size="12.5" fill="#94A3B8">re-ask, safe templated fallback.</text>
    <text x="842" y="750" font-size="12" fill="#64748B">cached Guard + metadata param:</text>
    <text x="842" y="768" font-size="12" fill="#64748B">~1.4s → ~6ms per call (250x)</text>
    <text x="842" y="792" font-size="11.5" fill="#475569">app/guardrails/no_leak.py</text>
  </g>

  <g>
    <rect x="1194" y="610" width="348" height="200" rx="14" fill="#161E30" stroke="#334155" stroke-width="1.5"/>
    <text x="1220" y="645" font-size="17" font-weight="700" fill="#F8FAFC">FastAPI + Browser</text>
    <text x="1220" y="668" font-size="12.5" fill="#94A3B8">REST API + a vanilla JS frontend</text>
    <text x="1220" y="686" font-size="12.5" fill="#94A3B8">(no framework). State machine:</text>
    <text x="1220" y="704" font-size="12.5" fill="#94A3B8">idle → recording → processing →</text>
    <text x="1220" y="722" font-size="12.5" fill="#94A3B8">speaking, driven by one mic button.</text>
    <text x="1220" y="750" font-size="12" fill="#64748B">graph built once at startup,</text>
    <text x="1220" y="768" font-size="12" fill="#64748B">sessions keyed by thread_id</text>
    <text x="1220" y="792" font-size="11.5" fill="#475569">app/web/server.py + static/</text>
  </g>

  <!-- ============ FOOTER STRIP ============ -->
  <rect x="60" y="850" width="1480" height="70" rx="12" fill="#111A2E" stroke="#1E293B" stroke-width="1"/>
  <text x="86" y="878" font-size="12.5" font-weight="600" fill="#60A5FA">Key properties:</text>
  <text x="86" y="900" font-size="12.5" fill="#94A3B8">grounded, not memorized · never leaks the reference answer while a question is open · bounded turns (provably terminates) · streams audio for responsiveness · degrades gracefully on provider failures</text>
</svg>
